appId: com.openclaw.companion
productName: OpenClaw-Companion
copyright: Copyright © 2025 OpenClaw-Companion

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - "!node_modules/**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: build/icon.png

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: build/icon.png
  category: Utility

# 自动更新配置
publish:
  provider: github
  owner: zhan69820
  repo: OpenClaw-Companion
  releaseType: release
