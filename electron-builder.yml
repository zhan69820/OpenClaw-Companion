appId: com.openclaw.companion
productName: OpenClaw Companion
copyright: Copyright © 2025 OpenClaw Companion

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - "!node_modules/**/*"

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.icns

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: build/icon.png
  category: Utility
