appId: com.openclaw.companion
productName: OpenClaw-Companion
copyright: Copyright © 2025 OpenClaw-Companion

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - "!node_modules/**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  # default 目标会自动生成 dmg 和 zip，zip 用于自动更新
  target:
    - target: default
      arch: [x64, arm64]
  icon: build/icon.png
  # 使用 ad-hoc 签名（不需要 Apple 开发者账号）
  identity: null
  # 禁用 Gatekeeper 评估
  gatekeeperAssess: false
  # 签名所有二进制文件
  signIgnore: []
  # 强制严格签名
  strictVerify: false

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: build/icon.png
  category: Utility

# 自动更新配置
publish:
  provider: github
  owner: zhan69820
  repo: OpenClaw-Companion
  releaseType: release
